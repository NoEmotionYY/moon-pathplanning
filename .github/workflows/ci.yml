name: MoonBit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  moon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MoonBit
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
      - name: Export MoonBit path
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Show toolchain
        run: moon version --all
      - name: Format check
        run: moon fmt --check
      - name: Generate interfaces
        run: moon info
      - name: Check
        run: moon check --deny-warn
      - name: Test
        run: moon test --deny-warn
      - name: CLI smoke test
        run: moon run cli
      - name: Example smoke test
        run: moon run cli -- --example weighted_grid
      - name: Native JSON smoke test
        run: moon run cli --target native -- --map examples/weighted_grid.json
      - name: Native HTML smoke test
        run: |
          moon run cli --target native -- --example weighted_grid --html /tmp/weighted_grid.html
          test -s /tmp/weighted_grid.html
      - name: Benchmark smoke test
        # Functional smoke test, not a performance baseline; bench currently has no --repeats flag.
        run: moon run ./bench -- --example rs_apso_20x20_simple
      - name: Verify generated interfaces are committed
        run: git diff --exit-code
